<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz-container{
    background:white;
    padding:30px;
    width:500px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

.option{
    display:block;
    margin:10px 0;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
}

button{
    padding:10px 20px;
    border:none;
    background:#3498db;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="quiz-container">

<h2 id="question">Question</h2>

<div id="options"></div>

<div class="buttons">
<button onclick="prevQuestion()">Back</button>
<button onclick="nextQuestion()">Next</button>
</div>

</div>


<div class="popup" id="resultPopup">
<div class="popup-content">
<h2>Quiz Result</h2>
<p id="score"></p>
<button onclick="location.reload()">Restart</button>
</div>
</div>


<script>

const questions = [

{
q:"Which one of the following methods is used by researchers for reducing biasness of scale while compositing several indicators?",
options:[
"Adding them together",
"Taking actual values",
"Segregating positive and negative indicators",
"Dividing values by mean"
],
answer:3
},

{
q:"Which one of the following is not a process of cultural change?",
options:[
"Acculturation",
"Diffusion",
"Innovation",
"Segregation"
],
answer:3
},

{
q:"Which depicts correct demographic equation of population growth?",
options:[
"Natural increase and dependency ratio",
"Natural increase and net migration",
"In-migration and birth rate",
"Out-migration and death rate"
],
answer:1
}

];

let current = 0
let userAnswers = new Array(questions.length).fill(null)

function loadQuestion(){

let q = questions[current]

document.getElementById("question").innerText =
(current+1) + ". " + q.q

let optionsHTML = ""

q.options.forEach((opt,i)=>{

optionsHTML +=
`<label class="option">
<input type="radio" name="option" value="${i}"
${userAnswers[current]==i ? "checked":""}>
${opt}
</label>`

})

document.getElementById("options").innerHTML = optionsHTML
}

function nextQuestion(){

let selected =
document.querySelector('input[name="option"]:checked')

if(selected)
userAnswers[current] = Number(selected.value)

if(current < questions.length-1)
{
current++
loadQuestion()
}
else
{
showResult()
}

}

function prevQuestion(){

if(current>0)
{
current--
loadQuestion()
}

}

function showResult(){

let score = 0

for(let i=0;i<questions.length;i++)
{

if(userAnswers[i] == questions[i].answer)
score += 1

else if(userAnswers[i] != null)
score -= 0.25
}

document.getElementById("score").innerText =
"Your Score: " + score

document.getElementById("resultPopup").style.display="flex"
}

loadQuestion()

</script>

</body>
</html>
